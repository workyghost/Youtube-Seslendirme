<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 15px; font-family: sans-serif; background: #181818; color: white; }
    h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
    label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
    input { width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box; background: #0f0f0f; border: 1px solid #333; color: white; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #cc0000; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #ff0000; }
    #status { margin-top: 10px; font-size: 12px; color: #4caf50; text-align: center; }
  </style>
</head>
<body>
  <h3>YouTube Çevirmen Ayarları</h3>
  <label>Gemini API Key (Zorunlu):</label>
  <input type="password" id="apiKey" placeholder="AI Studio API Anahtarınızı girin">
  <button id="saveBtn">Kaydet</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
