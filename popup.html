<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; padding: 15px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #181818; color: white; }
    h3 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; font-size: 16px; color: #ff4444; }
    .input-group { position: relative; margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 12px; color: #aaa; }
    input { width: 100%; padding: 10px 35px 10px 10px; box-sizing: border-box; background: #0f0f0f; border: 1px solid #444; color: white; border-radius: 6px; font-size: 14px; }
    input:focus { outline: none; border-color: #ff4444; }
    .eye-icon { position: absolute; right: 10px; top: 27px; cursor: pointer; font-size: 16px; user-select: none; }
    button { width: 100%; padding: 12px; background: #cc0000; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; margin-bottom: 10px; transition: 0.2s; }
    button:hover { background: #ff0000; }
    button:disabled { background: #555; cursor: not-allowed; }
    #status { font-size: 13px; text-align: center; min-height: 20px; margin-top: 10px; line-height: 1.4; padding: 5px; border-radius: 4px; }
    .success { color: #fff; background: #2e7d32; }
    .error { color: #fff; background: #c62828; }
  </style>
</head>
<body>
  <h3>YouTube Çevirmen (v2.0)</h3>
  <div class="input-group">
    <label>Gemini API Key (Zorunlu):</label>
    <input type="password" id="apiKey" placeholder="AIzaSy...">
    <span class="eye-icon" id="toggleEye">👁️</span>
  </div>
  <button id="saveBtn">Doğrula ve Kaydet</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
